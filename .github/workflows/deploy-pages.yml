name: Deploy newest QuestForge ZIP to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'QuestForge_Current_v*.zip'
      - 'QuestForge_Current.zip'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy QuestForge
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract newest QuestForge ZIP
        shell: bash
        run: |
          set -euo pipefail

          rm -rf site extracted
          mkdir -p site extracted

          ZIP_FILE="$(find . -maxdepth 1 -type f -name 'QuestForge_Current_v*.zip' -printf '%f\n' | sort -V | tail -n 1)"

          if [ -z "${ZIP_FILE}" ]; then
            if [ -f "QuestForge_Current.zip" ]; then
              ZIP_FILE="QuestForge_Current.zip"
            else
              echo "No QuestForge_Current_v*.zip or QuestForge_Current.zip file found."
              exit 1
            fi
          fi

          echo "Deploying ${ZIP_FILE}"
          unzip -o "${ZIP_FILE}" -d extracted

          GAME_INDEX="$(find extracted -type f -name index.html | head -n 1)"
          if [ -z "${GAME_INDEX}" ]; then
            echo "No index.html found inside ${ZIP_FILE}"
            exit 1
          fi

          GAME_DIR="$(dirname "${GAME_INDEX}")"
          echo "Game directory: ${GAME_DIR}"

          cp -R "${GAME_DIR}/." site/

          if [ ! -f "site/index.html" ]; then
            echo "site/index.html was not created."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
