name: Deploy QuestForge Release ZIP

on:
  release:
    types: [published, edited, prereleased, released]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy. Leave blank for latest release."
        required: false
        type: string
      asset_pattern:
        description: "Release asset ZIP pattern to deploy."
        required: false
        default: "QuestForge_Current_v*.zip"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: questforge-pages
  cancel-in-progress: true

jobs:
  deploy-release-zip:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve release tag and pattern
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PATTERN: ${{ inputs.asset_pattern }}
        run: |
          set -euo pipefail

          TAG="${EVENT_TAG:-}"
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          fi
          if [ -z "$TAG" ]; then
            TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')"
          fi

          PATTERN="${INPUT_PATTERN:-QuestForge_Current_v*.zip}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pattern=$PATTERN" >> "$GITHUB_OUTPUT"

      - name: Download matching QuestForge ZIP asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          PATTERN: ${{ steps.release.outputs.pattern }}
        run: |
          set -euo pipefail
          mkdir -p release_downloads

          echo "Available release assets:"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name'

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$PATTERN" \
            --dir release_downloads \
            --clobber

      - name: Select newest matching build ZIP
        id: select_zip
        run: |
          set -euo pipefail
          python3 <<'PY'
          import glob, os, re

          files = glob.glob('release_downloads/QuestForge_Current_v*.zip')
          if not files:
              raise SystemExit('No QuestForge_Current_v*.zip release asset was downloaded.')

          def key(path):
              name = os.path.basename(path)
              m = re.search(r'_v(\d+)', name, re.I)
              version = int(m.group(1)) if m else -1
              return (version, os.path.getmtime(path), name)

          chosen = sorted(files, key=key)[-1]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'zip={chosen}\n')
          print(f'Selected build ZIP: {chosen}')
          PY

      - name: Unpack build for GitHub Pages
        env:
          BUILD_ZIP: ${{ steps.select_zip.outputs.zip }}
        run: |
          set -euo pipefail
          rm -rf unpacked site
          mkdir -p unpacked site
          unzip -q "$BUILD_ZIP" -d unpacked

          INDEX_PATH="$(find unpacked -name index.html -type f | head -n 1 || true)"
          if [ -z "$INDEX_PATH" ]; then
            echo "No index.html found inside $BUILD_ZIP"
            exit 1
          fi

          APP_DIR="$(dirname "$INDEX_PATH")"
          cp -R "$APP_DIR"/. site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
