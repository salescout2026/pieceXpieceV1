name: Deploy ZIP to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip and locate game
        run: |
          rm -rf site extracted
          mkdir extracted site

          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          echo "Using ZIP: $ZIP_FILE"

          unzip -o "$ZIP_FILE" -d extracted

          GAME_DIR=$(find extracted -name index.html -type f | head -n 1 | xargs dirname)
          echo "Game folder: $GAME_DIR"

          if [ -z "$GAME_DIR" ]; then
            echo "No index.html found"
            exit 1
          fi

          cp -r "$GAME_DIR"/* site/

          echo "Publishing:"
          find site -maxdepth 3 -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
