name: Deploy newest ZIP to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unzip newest game package
        run: |
          set -euo pipefail

          rm -rf site extracted
          mkdir extracted site

          ZIP_FILE=""
          NEWEST_TIME=0

          while IFS= read -r -d '' candidate; do
            commit_time=$(git log -1 --format=%ct -- "$candidate" 2>/dev/null || echo 0)
            echo "Found ZIP: $candidate (last changed: $commit_time)"

            if [ "$commit_time" -gt "$NEWEST_TIME" ]; then
              NEWEST_TIME="$commit_time"
              ZIP_FILE="$candidate"
            fi
          done < <(find . -maxdepth 1 -type f -iname "*.zip" -print0)

          if [ -z "$ZIP_FILE" ]; then
            echo "No root-level .zip file found to deploy."
            exit 1
          fi

          echo "Using newest ZIP: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted

          GAME_INDEX=$(find extracted -name index.html -type f | head -n 1)
          if [ -z "$GAME_INDEX" ]; then
            echo "No index.html found inside $ZIP_FILE"
            exit 1
          fi

          GAME_DIR=$(dirname "$GAME_INDEX")
          echo "Game folder: $GAME_DIR"

          cp -r "$GAME_DIR"/* site/

          echo "Publishing:"
          find site -maxdepth 3 -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
