name: Deploy newest ZIP to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unzip highest versioned game package
        run: |
          set -euo pipefail

          rm -rf site extracted
          mkdir -p extracted site

          ZIP_FILE="$(find . -maxdepth 1 -type f -name 'QuestForge_Current_v*.zip' -printf '%f\n' | sort -V | tail -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            if [ -f "QuestForge_Current.zip" ]; then
              ZIP_FILE="QuestForge_Current.zip"
            else
              echo "No QuestForge_Current_v*.zip or QuestForge_Current.zip file found to deploy."
              exit 1
            fi
          fi

          echo "Using game ZIP: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted

          GAME_INDEX="$(find extracted -name index.html -type f | head -n 1)"
          if [ -z "$GAME_INDEX" ]; then
            echo "No index.html found inside $ZIP_FILE"
            exit 1
          fi

          GAME_DIR="$(dirname "$GAME_INDEX")"
          echo "Game folder: $GAME_DIR"

          cp -r "$GAME_DIR"/* site/

          echo "Publishing:"
          find site -maxdepth 3 -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
